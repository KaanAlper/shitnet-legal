<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <title>SHITNET Feature Graphic 1024×500</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
    }
    .stage {
      width: 1024px;
      height: 500px;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(ellipse 80% 60% at 20% 30%, rgba(255, 42, 157, 0.35) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 70%, rgba(0, 240, 255, 0.25) 0%, transparent 60%),
        linear-gradient(135deg, #0a0a0a 0%, #1a0e1a 100%);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    /* Stars */
    .stars {
      position: absolute; inset: 0;
      background-image:
        radial-gradient(2px 2px at 10% 20%, #ffea00, transparent),
        radial-gradient(2px 2px at 80% 10%, #00f0ff, transparent),
        radial-gradient(1.5px 1.5px at 50% 80%, #ff2a9d, transparent),
        radial-gradient(1.5px 1.5px at 90% 60%, #ffea00, transparent),
        radial-gradient(2px 2px at 30% 70%, #fff, transparent),
        radial-gradient(1px 1px at 60% 30%, #fff, transparent),
        radial-gradient(2px 2px at 15% 85%, #00f0ff, transparent),
        radial-gradient(1.5px 1.5px at 70% 50%, #ffea00, transparent);
      opacity: 0.6;
    }
    /* Big toilet emoji on right */
    .toilet {
      position: absolute;
      right: 40px;
      top: 50%;
      transform: translateY(-50%) rotate(-8deg);
      font-size: 280px;
      line-height: 1;
      filter: drop-shadow(0 0 30px rgba(255, 234, 0, 0.4));
    }
    /* Earth in the toilet — small overlay */
    .earth {
      position: absolute;
      right: 130px;
      top: 50%;
      transform: translateY(-30%);
      font-size: 90px;
      filter: drop-shadow(0 0 18px rgba(0, 240, 255, 0.6));
    }
    /* Content left */
    .content {
      position: absolute;
      left: 60px;
      top: 50%;
      transform: translateY(-50%);
      max-width: 560px;
    }
    .logo {
      font-family: 'Bangers', cursive;
      font-size: 110px;
      letter-spacing: 4px;
      line-height: 1;
      text-shadow:
        5px 5px 0 #000,
        -2px -2px 0 #000,
        2px -2px 0 #000,
        -2px 2px 0 #000;
    }
    .logo .shit { color: #00f0ff; }
    .logo .net { color: #ff2a9d; }
    .tagline {
      margin-top: 20px;
      font-family: 'Bangers', cursive;
      font-size: 42px;
      color: #fff;
      line-height: 1.1;
      letter-spacing: 1px;
      text-shadow: 3px 3px 0 #000;
    }
    .tagline .accent { color: #ffea00; font-style: italic; }
    .subtitle {
      margin-top: 18px;
      font-family: 'Press Start 2P', monospace;
      font-size: 14px;
      color: #ffea00;
      text-shadow: 2px 2px 0 #000;
      letter-spacing: 2px;
    }
    /* Decorative paper rect behind logo */
    .paper {
      position: absolute;
      left: 30px;
      top: 30px;
      width: 600px;
      height: 360px;
      background: rgba(255, 250, 240, 0.04);
      border-left: 4px solid #ff2a9d;
      transform: rotate(-1.5deg);
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="stars"></div>
    <div class="paper"></div>
    <div class="toilet">🚽</div>
    <div class="earth">🌍</div>
    <div class="content">
      <div class="logo"><span class="shit">SHIT</span><span class="net">NET</span></div>
      <div class="tagline">DÜNYA BOKTAN.<br><span class="accent">SEN İYİSİNİ BUL.</span></div>
      <div class="subtitle">★ TUVALET ATLASI ★</div>
    </div>
  </div>
</body>
</html>
